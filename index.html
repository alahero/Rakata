<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rakata | No Rules, No Filters</title>
    <link rel="stylesheet" href="index.css">
    <!-- Lucide Icons for Hamburger -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <div class="bg-grain"></div>

    <!-- Navigation -->
    <nav class="nav-main" id="navbar">
        <div class="section-container nav-inner">
            <!-- Logo Variants -->
            <div class="nav-logo">
                <img src="public/Rakata_Logo.svg" alt="Rakata Logo" class="desktop-logo" style="height: 50px;">
                <img src="public/Rakata_Compressed_Logo.svg" alt="Rakata Logo" class="mobile-logo"
                    style="height: 40px; display: none;">
            </div>

            <!-- Central Menu (Desktop) -->
            <div class="nav-links">
                <a href="#venues" class="nav-link">Venues</a>
                <a href="#events" class="nav-link">Events</a>
                <a href="#music" class="nav-link">Music</a>
                <a href="#location" class="nav-link">Location</a>
            </div>

            <!-- Right Actions -->
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button class="btn-void" style="border-width: 2px; padding: 0.5rem 1.5rem; font-size: 0.8rem;">BOOK
                    NOW</button>
                <button class="mobile-menu-btn"
                    style="background: none; border: none; color: var(--white); cursor: pointer; display: none;">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <header class="hero">
        <!-- Desktop Video -->
        <video class="hero-video-bg desktop-video" autoplay muted loop playsinline>
            <source src="https://mandalatickets.com/assets/uploads/video/cancun/rakata.mp4" type="video/mp4">
        </video>
        <!-- Mobile Video -->
        <video class="hero-video-bg mobile-video" autoplay muted loop playsinline style="display: none;">
            <source src="https://mandalatickets.com/assets/videos/cancun/n_rakata.mp4" type="video/mp4">
        </video>

        <div class="hero-content">
            <h1 class="hero-title twitch-text" style="color: var(--white); text-shadow: 4px 4px 0 var(--magenta);">
                NO RULES,<br>NO FILTERS
            </h1>

            <div class="tilted-wrapper">
                <span class="tilted-subtitle">La Capital del Perreo</span>
            </div>

            <div style="margin-top: 3rem;">
                <button class="btn-book-rakata">BOOK YOUR TABLE</button>
            </div>
        </div>
    </header>

    <!-- Rest of the sections for scrolling demo -->
    <main style="background: var(--void); position: relative; z-index: 10;">
        <section id="venues" class="section-container" style="padding: 10rem 1.5rem;">
            <h2 class="text-rebel" style="font-size: 4rem; margin-bottom: 2rem;">Venues</h2>
            <div class="grid-urban">
                <div class="brutalist-border"
                    style="aspect-ratio: 1; background: var(--zinc-900); display: flex; align-items: center; justify-content: center;">
                    <span class="text-rebel">CANCUN</span>
                </div>
                <div class="brutalist-border"
                    style="aspect-ratio: 1; background: var(--zinc-900); display: flex; align-items: center; justify-content: center;">
                    <span class="text-rebel">PUERTO VALLARTA</span>
                </div>
                <div class="brutalist-border"
                    style="aspect-ratio: 1; background: var(--zinc-900); display: flex; align-items: center; justify-content: center;">
                    <span class="text-rebel">PLAYA DEL CARMEN</span>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Scroll Effect for Navbar
        const navbar = document.getElementById('navbar');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        });

        // Responsive Handling for Logo and Videos
        function handleResize() {
            const isMobile = window.innerWidth <= 768;
            const desktopLogo = document.querySelector('.desktop-logo');
            const mobileLogo = document.querySelector('.mobile-logo');
            const desktopVideo = document.querySelector('.desktop-video');
            const mobileVideo = document.querySelector('.mobile-video');
            const menuBtn = document.querySelector('.mobile-menu-btn');

            if (isMobile) {
                desktopLogo.style.display = 'none';
                mobileLogo.style.display = 'block';
                desktopVideo.style.display = 'none';
                mobileVideo.style.display = 'block';
                menuBtn.style.display = 'block';
            } else {
                desktopLogo.style.display = 'block';
                mobileLogo.style.display = 'none';
                desktopVideo.style.display = 'block';
                mobileVideo.style.display = 'none';
                menuBtn.style.display = 'none';
            }
        }

        window.addEventListener('resize', handleResize);
        window.addEventListener('DOMContentLoaded', handleResize);
    </script>
</body>

</html>
